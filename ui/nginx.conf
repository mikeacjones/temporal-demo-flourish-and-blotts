server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — re-resolve upstream per request so nginx doesn't pin
    # to a stale container IP after `docker compose up` recreates the api service.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        # proxy_pass with a variable skips URI rewriting, so pass the full request
        # URI through via $request_uri.
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
